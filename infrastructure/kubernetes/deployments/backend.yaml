apiVersion: apps/v1
kind: Deployment
metadata:
  name: sorolend-backend
  namespace: sorolend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sorolend-backend
  template:
    metadata:
      labels:
        app: sorolend-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/sorolend/backend:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        envFrom:
        - secretRef:
            name: sorolend-backend-secrets
        - configMapRef:
            name: sorolend-backend-config
