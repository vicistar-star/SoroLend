apiVersion: apps/v1
kind: Deployment
metadata:
  name: sorolend-liquidation-bot
  namespace: sorolend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sorolend-liquidation-bot
  template:
    metadata:
      labels:
        app: sorolend-liquidation-bot
    spec:
      containers:
      - name: liquidation-bot
        image: ghcr.io/sorolend/backend:latest
        command: ["node", "dist/main.js"]
        args: ["--liquidation-bot-only"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        envFrom:
        - secretRef:
            name: sorolend-backend-secrets
        - configMapRef:
            name: sorolend-backend-config
