apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sorolend-ingress
  namespace: sorolend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: sorolend.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sorolend-frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: sorolend-backend
            port:
              number: 3000
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: sorolend-backend
            port:
              number: 3000
