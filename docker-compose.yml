version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sorolend
      POSTGRES_USER: sorolend
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sorolend123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sorolend"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: sorolend
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq123}
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ./backend
      target: development
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://sorolend:${DB_PASSWORD:-sorolend123}@postgres:5432/sorolend
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      - RABBITMQ_URL=amqp://sorolend:${RABBITMQ_PASSWORD:-rabbitmq123}@rabbitmq:5672
    volumes:
      - ./backend/src:/app/src
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "4200:4200"
    environment:
      - API_URL=http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
